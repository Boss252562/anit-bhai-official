<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f2f2f2;
}

.box{
  margin-top:50px;
}

#profile{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #0072ff;
  object-fit:cover;
}

button{
  padding:10px 20px;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="box">

<h2>🏠 Home Page</h2>

<!-- 🔥 Profile Photo -->
<img id="profile" src="https://via.placeholder.com/100" onclick="goRegister()">

<p>Click image to Register</p>

</div>

<script>

//////////////////////
// LOAD PHOTO
//////////////////////
window.onload = function(){

let photo = localStorage.getItem("userPhoto");

if(photo){
  document.getElementById("profile").src = photo;
}

};

//////////////////////
// GO REGISTER PAGE
//////////////////////
function goRegister(){
window.location.href = "register.html";
}

</script>

</body>
</html>
